# Local Postgres for development only.
#
# The backend and frontend are no longer containerised — both deploy to Vercel,
# and locally they run straight from npm (`npm run dev` in each), which is
# faster to iterate on than rebuilding an image. This file exists solely so
# `docker compose up -d` gives you a database on the same major version as
# production without installing Postgres on the host.
#
# Point the backend at it with:
#   DATABASE_URL=postgresql://transit:transit123@localhost:5432/transit_ledger

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transit
      POSTGRES_PASSWORD: transit123
      POSTGRES_DB: transit_ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transit -d transit_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
